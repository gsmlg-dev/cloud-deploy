name: Deploy NixOS

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target host to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - vultr-01
          - vultr-02
          - vultr-03
          - vultr-04
          - all

env:
  NIX_CONFIG_REPO: git@github.com:Gao-OS/nix-config.git
  SSH_USER: gao
  DOMAIN: ${{ secrets.MY_DOMAIN }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to ${{ matrix.host }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJSON(github.event.inputs.target == 'all' && '["vultr-01", "vultr-02", "vultr-03", "vultr-04"]' || format('["{0}"]', github.event.inputs.target)) }}

    steps:
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}
            ${{ secrets.NIX_CONFIG_DEPLOY_KEY }}

      - name: Configure SSH known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Clone NixOS configuration
        run: |
          git clone ${{ env.NIX_CONFIG_REPO }} nix-config
          cd nix-config
          echo "Cloned nix-config at commit: $(git rev-parse HEAD)"

      - name: Deploy to ${{ matrix.host }}
        working-directory: nix-config
        run: |
          TARGET="${{ env.SSH_USER }}@${{ matrix.host }}.${{ env.DOMAIN }}"
          echo "::group::Deploying to $TARGET"

          nix shell nixpkgs#nixos-rebuild -c nixos-rebuild switch \
            --flake .#${{ matrix.host }} \
            --target-host "$TARGET" \
            --use-remote-sudo \
            --verbose

          echo "::endgroup::"

      - name: Verify deployment
        run: |
          ssh ${{ env.SSH_USER }}@${{ matrix.host }}.${{ env.DOMAIN }} 'nixos-version && uptime'
